name: ShopKart Allure Report

on:
  push:
    branches:
      - main

permissions:
  contents: write


jobs:

  allure-report:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
          cache: gradle


      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4


      - name: Run Tests
        run: |
          chmod +x gradlew
          ./gradlew reporting --no-configuration-cache
        continue-on-error: true


      - name: Copy Allure Environment
        if: always()
        run: |
          mkdir -p build/allure-results
          cp src/test/resources/environment.properties build/allure-results/environment.properties || true


      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: build/allure-results
          allure_report: allure-report
          allure_history: allure-history


      # Debug folder before deployment
      - name: Check Allure History
        if: always()
        run: |
          ls -la
          ls -la allure-history


      - name: Deploy Allure Report
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./allure-history
          force_orphan: true
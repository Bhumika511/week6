name: ShopKart Allure Report

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  allure-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout gh-pages branch
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Tests
        continue-on-error: true
        run: |
          chmod +x gradlew
          ./gradlew reporting --no-configuration-cache

      - name: Copy Allure Environment
        if: always()
        run: |
          mkdir -p build/allure-results
          cp src/test/resources/environment.properties build/allure-results/environment.properties || true

      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          gh_pages: gh-pages
          allure_results: build/allure-results
          allure_report: allure-report
          allure_history: allure-history

      - name: Check Generated Report
        if: always()
        run: |
          echo "=== allure-history ==="
          ls -R allure-history || true

          echo "=== history ==="
          ls -R allure-history/history || true

      - name: Deploy Allure Report
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./allure-history